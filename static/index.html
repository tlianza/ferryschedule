<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Larkspur Ferry Schedule</title>
    <meta
      name="description"
      content="Mobile-friendly ferry schedule for Larkspur and San Francisco Ferry Building."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <p class="eyebrow">Golden Gate Ferry</p>
        <h1>Larkspur Schedule</h1>
        <p class="subhead">Fast glance at the next departure, tuned for your phone.</p>
      </header>

      <section class="panel controls">
        <label for="schedule-select">Schedule</label>
        <select id="schedule-select" aria-label="Schedule"></select>
        <p id="status" class="status">Loading timetable data...</p>
      </section>

      <section class="panel" aria-live="polite">
        <h2 id="table-title">Departures</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th id="departure-col">Departure</th>
                <th id="arrival-col">Arrival</th>
              </tr>
            </thead>
            <tbody id="schedule-rows"></tbody>
          </table>
        </div>
      </section>

      <footer class="meta">
        <p>Source data from 511.org / Golden Gate Ferry.</p>
        <p>
          Official schedule:
          <a href="https://www.goldengate.org/ferry/route-schedule/larkspur-san-francisco/">goldengate.org</a>
        </p>
        <p id="valid-until"></p>
      </footer>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
