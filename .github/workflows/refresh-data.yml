name: Refresh ferry data

# Daily refresh of static/data/timetable.json. On change, the bot commits and
# pushes; the existing deploy hook publishes the update. We never run wrangler
# here on purpose.
on:
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC ~ 6am Pacific
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # refresh-data.mjs uses only Node built-ins (fetch, node:fs), so no install.
      - name: Refresh timetable
        env:
          API_511_KEY: ${{ secrets.API_511_KEY }}
        run: npm run refresh:data

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- static/data/timetable.json; then
            echo "Timetable unchanged; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data/timetable.json
          git commit -m "Refresh timetable data ($(date -u +%F))"
          git push
